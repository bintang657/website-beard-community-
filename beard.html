<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEARD COMMUNITY</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scrollbar-width: thin;
            scrollbar-color: #00e5ff #0a0a0a;
        }

        *::-webkit-scrollbar {
            width: 6px;
        }

        *::-webkit-scrollbar-track {
            background: #0a0a0a;
        }

        *::-webkit-scrollbar-thumb {
            background: #00e5ff;
            border-radius: 3px;
        }

        :root {
            --cyan: #00e5ff;
            --cyan-dark: #00b8d4;
            --cyan-light: #18ffff;
            --cyan-glow: rgba(0, 229, 255, 0.3);
            --cyan-glow-strong: rgba(0, 229, 255, 0.6);
            --bg-primary: #0a0a0f;
            --bg-secondary: #0f1923;
            --bg-card: rgba(15, 25, 35, 0.8);
            --text-primary: #e0f7fa;
            --text-secondary: #80deea;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow-x: hidden;
            cursor: default;
        }

        /* ===== CUSTOM CURSOR ===== */
        .cursor {
            width: 20px;
            height: 20px;
            border: 2px solid var(--cyan);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 100000;
            transition: transform 0.15s ease, opacity 0.15s ease;
            transform: translate(-50%, -50%);
        }

        .cursor-dot {
            width: 4px;
            height: 4px;
            background: var(--cyan);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 100001;
            transform: translate(-50%, -50%);
        }

        .cursor.hover {
            transform: translate(-50%, -50%) scale(2);
            background: var(--cyan-glow);
            border-color: var(--cyan-light);
        }

        /* ===== LOADING SCREEN ===== */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 99999;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        #loader.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader-logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--cyan);
            overflow: hidden;
            margin-bottom: 30px;
            animation: logoPulse 2s ease-in-out infinite;
            box-shadow: 0 0 40px var(--cyan-glow), 0 0 80px rgba(0,229,255,0.1);
        }

        .loader-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @keyframes logoPulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 40px var(--cyan-glow); }
            50% { transform: scale(1.05); box-shadow: 0 0 60px var(--cyan-glow-strong); }
        }

        .loader-bar-container {
            width: 300px;
            height: 3px;
            background: rgba(0,229,255,0.1);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .loader-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--cyan-dark), var(--cyan-light));
            border-radius: 2px;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px var(--cyan-glow);
        }

        .loader-text {
            font-family: 'Share Tech Mono', monospace;
            color: var(--cyan);
            font-size: 14px;
            letter-spacing: 3px;
        }

        .loader-percent {
            font-family: 'Orbitron', sans-serif;
            color: var(--cyan);
            font-size: 24px;
            margin-top: 10px;
            font-weight: 700;
        }

        /* ===== CANVAS BG ===== */
        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* ===== NAVIGATION ===== */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 1000;
            background: linear-gradient(180deg, rgba(10,10,15,0.95) 0%, transparent 100%);
            backdrop-filter: blur(10px);
            transition: all 0.4s ease;
        }

        nav.scrolled {
            padding: 15px 60px;
            background: rgba(10,10,15,0.98);
            border-bottom: 1px solid rgba(0,229,255,0.1);
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
        }

        .nav-logo {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid var(--cyan);
            overflow: hidden;
            box-shadow: 0 0 20px var(--cyan-glow);
            transition: transform 0.3s ease;
        }

        .nav-logo:hover {
            transform: rotate(360deg);
        }

        .nav-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .nav-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            font-weight: 800;
            color: var(--cyan);
            letter-spacing: 3px;
            text-shadow: 0 0 20px var(--cyan-glow);
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 40px;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-secondary);
            font-family: 'Rajdhani', sans-serif;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            position: relative;
            transition: color 0.3s ease;
            padding: 5px 0;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--cyan);
            transition: width 0.3s ease;
            box-shadow: 0 0 10px var(--cyan-glow);
        }

        .nav-links a:hover {
            color: var(--cyan);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-discord {
            padding: 10px 25px;
            background: transparent;
            border: 2px solid var(--cyan);
            color: var(--cyan);
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 2px;
            text-decoration: none;
            text-transform: uppercase;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .nav-discord::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--cyan);
            transition: left 0.3s ease;
            z-index: -1;
        }

        .nav-discord:hover::before {
            left: 0;
        }

        .nav-discord:hover {
            color: var(--bg-primary);
        }

        /* Mobile Menu */
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
            z-index: 1001;
        }

        .hamburger span {
            width: 30px;
            height: 2px;
            background: var(--cyan);
            transition: all 0.3s ease;
        }

        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(6px, 6px);
        }

        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }

        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(6px, -6px);
        }

        /* ===== HERO SECTION ===== */
        #hero {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
            overflow: hidden;
        }

        .hero-content {
            text-align: center;
            z-index: 2;
            perspective: 1000px;
        }

        .hero-badge {
            display: inline-block;
            padding: 8px 25px;
            border: 1px solid rgba(0,229,255,0.3);
            color: var(--cyan);
            font-family: 'Share Tech Mono', monospace;
            font-size: 13px;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 30px;
            background: rgba(0,229,255,0.05);
            animation: fadeInDown 1s ease 0.5s both;
        }

        .hero-logo-main {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 3px solid var(--cyan);
            overflow: hidden;
            margin: 0 auto 40px;
            box-shadow: 0 0 60px var(--cyan-glow), 0 0 120px rgba(0,229,255,0.1), inset 0 0 60px rgba(0,229,255,0.05);
            animation: heroLogoFloat 6s ease-in-out infinite, fadeIn 1s ease 0.3s both;
            position: relative;
        }

        .hero-logo-main img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .hero-logo-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 220px;
            height: 220px;
            border: 1px solid rgba(0,229,255,0.2);
            border-radius: 50%;
            animation: ringRotate 10s linear infinite;
        }

        .hero-logo-ring::before {
            content: '';
            position: absolute;
            top: -3px;
            left: 50%;
            width: 6px;
            height: 6px;
            background: var(--cyan);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--cyan);
        }

        .hero-logo-ring-2 {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 260px;
            height: 260px;
            border: 1px dashed rgba(0,229,255,0.1);
            border-radius: 50%;
            animation: ringRotate 15s linear infinite reverse;
        }

        @keyframes ringRotate {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        @keyframes heroLogoFloat {
            0%, 100% { transform: translateY(0) rotateY(0deg); }
            25% { transform: translateY(-10px) rotateY(5deg); }
            50% { transform: translateY(-20px) rotateY(0deg); }
            75% { transform: translateY(-10px) rotateY(-5deg); }
        }

        .hero-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 72px;
            font-weight: 900;
            letter-spacing: 10px;
            line-height: 1.1;
            margin-bottom: 20px;
            animation: fadeInUp 1s ease 0.7s both;
            background: linear-gradient(135deg, var(--cyan-light), var(--cyan), var(--cyan-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            filter: drop-shadow(0 0 30px var(--cyan-glow));
        }

        .hero-subtitle {
            font-family: 'Share Tech Mono', monospace;
            font-size: 18px;
            color: var(--text-secondary);
            letter-spacing: 6px;
            margin-bottom: 50px;
            animation: fadeInUp 1s ease 0.9s both;
        }

        .hero-cta-group {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
            animation: fadeInUp 1s ease 1.1s both;
        }

        .btn-primary {
            padding: 15px 45px;
            background: var(--cyan);
            color: var(--bg-primary);
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-decoration: none;
            border: none;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            clip-path: polygon(0 0, calc(100% - 15px) 0, 100% 15px, 100% 100%, 15px 100%, 0 calc(100% - 15px));
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 40px var(--cyan-glow);
        }

        .btn-secondary {
            padding: 15px 45px;
            background: transparent;
            color: var(--cyan);
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-decoration: none;
            border: 2px solid var(--cyan);
            cursor: pointer;
            transition: all 0.3s ease;
            clip-path: polygon(0 0, calc(100% - 15px) 0, 100% 15px, 100% 100%, 15px 100%, 0 calc(100% - 15px));
        }

        .btn-secondary:hover {
            background: rgba(0,229,255,0.1);
            transform: translateY(-3px);
            box-shadow: 0 10px 40px rgba(0,229,255,0.15);
        }

        .hero-scroll-indicator {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            animation: fadeIn 1s ease 1.5s both;
        }

        .scroll-line {
            width: 1px;
            height: 60px;
            background: linear-gradient(180deg, var(--cyan), transparent);
            animation: scrollPulse 2s ease-in-out infinite;
        }

        @keyframes scrollPulse {
            0%, 100% { opacity: 1; transform: scaleY(1); }
            50% { opacity: 0.3; transform: scaleY(0.5); }
        }

        .scroll-text {
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px;
            color: var(--cyan);
            letter-spacing: 3px;
            text-transform: uppercase;
            writing-mode: vertical-rl;
        }

        /* ===== SECTION STYLES ===== */
        section {
            position: relative;
            z-index: 1;
            padding: 120px 60px;
        }

        .section-header {
            text-align: center;
            margin-bottom: 80px;
        }

        .section-label {
            font-family: 'Share Tech Mono', monospace;
            font-size: 13px;
            color: var(--cyan);
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 15px;
            display: block;
        }

        .section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 48px;
            font-weight: 800;
            letter-spacing: 5px;
            background: linear-gradient(135deg, var(--cyan-light), var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
        }

        .section-line {
            width: 80px;
            height: 3px;
            background: var(--cyan);
            margin: 0 auto;
            box-shadow: 0 0 15px var(--cyan-glow);
        }

        /* ===== ABOUT SECTION ===== */
        #about {
            background: linear-gradient(180deg, transparent, rgba(0,229,255,0.02), transparent);
        }

        .about-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 80px;
            max-width: 1200px;
            margin: 0 auto;
            align-items: center;
        }

        .about-3d-container {
            position: relative;
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 800px;
        }

        .about-cube {
            width: 200px;
            height: 200px;
            position: relative;
            transform-style: preserve-3d;
            animation: cubeRotate 20s linear infinite;
        }

        @keyframes cubeRotate {
            from { transform: rotateX(0deg) rotateY(0deg); }
            to { transform: rotateX(360deg) rotateY(360deg); }
        }

        .cube-face {
            position: absolute;
            width: 200px;
            height: 200px;
            border: 2px solid var(--cyan);
            background: rgba(0,229,255,0.03);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 30px rgba(0,229,255,0.05), 0 0 20px rgba(0,229,255,0.1);
        }

        .cube-face img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            opacity: 0.8;
        }

        .cube-face:nth-child(1) { transform: translateZ(100px); }
        .cube-face:nth-child(2) { transform: rotateY(180deg) translateZ(100px); }
        .cube-face:nth-child(3) { transform: rotateY(90deg) translateZ(100px); }
        .cube-face:nth-child(4) { transform: rotateY(-90deg) translateZ(100px); }
        .cube-face:nth-child(5) { transform: rotateX(90deg) translateZ(100px); }
        .cube-face:nth-child(6) { transform: rotateX(-90deg) translateZ(100px); }

        .about-text h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            font-weight: 700;
            color: var(--cyan);
            margin-bottom: 20px;
            letter-spacing: 3px;
        }

        .about-text p {
            font-size: 17px;
            line-height: 1.8;
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        .about-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            margin-top: 40px;
        }

        .stat-card {
            text-align: center;
            padding: 25px 15px;
            border: 1px solid rgba(0,229,255,0.15);
            background: rgba(0,229,255,0.03);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            border-color: var(--cyan);
            background: rgba(0,229,255,0.08);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,229,255,0.1);
        }

        .stat-number {
            font-family: 'Orbitron', sans-serif;
            font-size: 32px;
            font-weight: 800;
            color: var(--cyan);
            display: block;
        }

        .stat-label {
            font-family
